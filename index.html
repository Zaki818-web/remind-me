<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special For You 💖</title>

<!-- FONT ELEGAN -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  font-family:'Poppins',sans-serif;
}

.card{
  width:90%;
  max-width:380px;
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h2{
  font-family:'Playfair Display',serif;
  font-size:22px;
  margin-bottom:10px;
  color:#ff4d6d;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:white;
  font-size:15px;
}

/* FOTO */
img{
  width:100%;
  margin-top:15px;
  border-radius:15px;

  opacity:0;
  transform:scale(1.03);
  transition:opacity 0.8s ease, transform 0.8s ease;
}

.show{
  opacity:1 !important;
  transform:scale(1) !important;
}
</style>
</head>

<body>

<div class="card">
  <h2>💌 Special Moment</h2>
  <button onclick="start()">Buka 💖</button>

  <img id="foto">
</div>

<script>

const images=[
"foto1","foto2","foto3","foto4","foto5",
"foto6","foto7","foto8","foto9","foto10",
"foto11","foto12","foto13","foto14","foto15"
];

let index=0;
let img=document.getElementById("foto");

/* 🔥 PRELOAD (INI KUNCI ANTI GLITCH) */
const preload=[];
images.forEach(n=>{
  ["jpg","jpeg","JPG"].forEach(ext=>{
    let i=new Image();
    i.src=n+"."+ext;
    preload.push(i);
  });
});

function start(){
  document.querySelector("button").style.display="none";
  showImage();

  setInterval(()=>{
    index++;
    if(index>=images.length) index=0;
    showImage();
  },3000);
}

function showImage(){
  img.classList.remove("show");

  setTimeout(()=>{
    loadImage(images[index]);
  },150);
}

/* AUTO DETECT + STABIL */
function loadImage(name){
  const ext=[".jpg",".jpeg",".JPG"];
  let i=0;

  function tryLoad(){
    if(i>=ext.length) return;

    img.src=name+ext[i];

    img.onload=()=>{
      img.classList.add("show");
    }

    img.onerror=()=>{
      i++;
      tryLoad();
    }
  }

  tryLoad();
}

</script>

</body>
</html>
